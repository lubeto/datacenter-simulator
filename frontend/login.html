<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Simulator — Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'><rect width='32' height='32' rx='7' fill='%232563eb'/><rect x='4' y='6' width='24' height='6' rx='1.5' fill='white'/><rect x='4' y='14' width='24' height='6' rx='1.5' fill='white'/><rect x='4' y='22' width='24' height='6' rx='1.5' fill='white' opacity='0.6'/><circle cx='24.5' cy='9' r='1.8' fill='%234ade80'/><circle cx='24.5' cy='17' r='1.8' fill='%234ade80'/><circle cx='24.5' cy='25' r='1.8' fill='%23facc15'/><rect x='6' y='7.5' width='10' height='3' rx='1' fill='%2393c5fd'/><rect x='6' y='15.5' width='10' height='3' rx='1' fill='%2393c5fd'/><rect x='6' y='23.5' width='10' height='3' rx='1' fill='%23bfdbfe' opacity='0.6'/></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 20px;
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 3rem; margin-bottom: 8px; }
    .logo-title { font-size: 1.5rem; font-weight: 800; color: #60a5fa; }
    .logo-sub { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
    .card {
      background: #1e2433;
      border-radius: 16px;
      padding: 32px;
      border: 1px solid #334155;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #1d4ed8;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      background: #450a0a;
      border: 1px solid #dc2626;
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 12px;
      display: none;
    }
    .success-msg {
      background: #14532d;
      border: 1px solid #16a34a;
      color: #86efac;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 12px;
      display: none;
    }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="container">
    <div class="logo-area">
      <div class="logo-icon">&#x1F5A5;&#xFE0F;</div>
      <div class="logo-title">DC Monitoring Simulator</div>
      <div class="logo-sub">Sistema de Monitoreo de Centro de Datos &middot; Pr&aacute;ctica Estudiantil</div>
    </div>

    <div class="card">
      <div class="error-msg" id="login-error"></div>
      <div class="success-msg" id="login-success"></div>
      <div class="form-group">
        <label>Correo Electr&oacute;nico</label>
        <input type="email" id="login-email" placeholder="usuario@universidad.edu" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contrase&ntilde;a</label>
        <input type="password" id="login-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">
        Acceder al Simulador
      </button>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    function showMsg(id, msg, isError=true) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display='none', 5000);
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;
      if (!email || !pass) { showMsg('login-error','Completa todos los campos'); return; }

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Ingresando...';

      try {
        const fd = new FormData();
        fd.append('username', email);
        fd.append('password', pass);
        const res = await fetch(`${API}/api/auth/login`, { method:'POST', body:fd });
        const data = await res.json();

        if (!res.ok) {
          showMsg('login-error', data.detail || 'Credenciales incorrectas');
          return;
        }
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('student', JSON.stringify(data.student));

        showMsg('login-success', 'Acceso concedido. Redirigiendo...', false);
        document.getElementById('login-success').style.display = 'block';

        setTimeout(() => {
          window.location.href = data.student.role === 'instructor' ? '/instructor' : '/';
        }, 800);

      } catch(e) {
        showMsg('login-error', 'Error de conexion con el servidor');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Acceder al Simulador';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    if (localStorage.getItem('token')) {
      const s = JSON.parse(localStorage.getItem('student')||'{}');
      window.location.href = s.role === 'instructor' ? '/instructor' : '/';
    }
  </script>

<div id="firma-footer" style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,0.95);border-top:1px solid #7c3aed;padding:4px 20px;display:flex;justify-content:space-between;align-items:center;font-size:.65rem;color:#64748b;z-index:99999">
  <span>&#x1F5A5;&#xFE0F; DC Monitoring Simulator &copy; 2026</span>
  <span style="color:#a78bfa;font-weight:700">Diseñado por Ing. de Sistemas Luis Alberto Vasquez Campos</span>
  <span>Práctica Estudiantil &middot; SENA</span>
</div>
</body>
</html>
