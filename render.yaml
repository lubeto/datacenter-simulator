# =============================================================================
# DC Monitoring Simulator — Configuración para Render.com
# Documentación: https://render.com/docs/blueprint-spec
# =============================================================================

services:
  - type: web
    name: dc-monitoring-simulator
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .

    # ── Plan (starter = 512MB RAM, 0.5 CPU, sin sleep) ─────────────────
    plan: starter       # $7/mes — sin inactividad, disco persistente incluido

    # ── Región ─────────────────────────────────────────────────────────
    region: oregon      # us-west-2; otras: frankfurt, singapore, ohio

    # ── Puerto de escucha ───────────────────────────────────────────────
    port: 8000

    # ── Health check ────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Variables de entorno ────────────────────────────────────────────
    envVars:
      # Seguridad — DEBE ser un valor fijo y secreto.
      # generateValue: true lo regenera en cada deploy e invalida TODOS los tokens JWT.
      # Establece este valor UNA VEZ en el Dashboard de Render → Environment → SECRET_KEY
      # (usa una cadena larga aleatoria, ej: openssl rand -hex 32)
      - key: SECRET_KEY
        sync: false                  # Render te pedirá el valor; nunca cambia entre deploys

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"

      # Servidor
      - key: DEBUG
        value: "false"

      - key: ENVIRONMENT
        value: production

      # Base de datos — PostgreSQL (ver sección databases abajo)
      - key: DATABASE_URL
        fromDatabase:
          name: dc-simulator-db
          property: connectionString

      # Admin inicial (cambia desde el Dashboard de Render)
      - key: ADMIN_EMAIL
        value: instructor@datacenter.edu

      - key: ADMIN_PASSWORD
        sync: false      # Render te pedirá el valor al hacer deploy (no lo expone)

      - key: ADMIN_NAME
        value: "Instructor Principal"

      # Simulación
      - key: NUM_NODES
        value: "12"

      - key: METRICS_INTERVAL_SECONDS
        value: "2"

      - key: AUTO_ATTACK_ENABLED
        value: "true"

      - key: AUTO_ATTACK_MIN_INTERVAL_MIN
        value: "5"

      - key: AUTO_ATTACK_MAX_INTERVAL_MIN
        value: "20"

      # CORS — reemplaza con tu URL de Render después del primer deploy
      # Ejemplo: https://dc-monitoring-simulator.onrender.com
      - key: ALLOWED_ORIGINS
        value: "*"    # Cambia a tu dominio exacto después del primer deploy

      # Token para registrar instructores nuevos (protege el endpoint /api/auth/register)
      - key: INSTRUCTOR_REGISTER_TOKEN
        generateValue: true

      # Rate limiting
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"

      - key: RATE_LIMIT_AUTH_PER_MINUTE
        value: "10"

    # ── Disco persistente (SQLite + reportes) ───────────────────────────
    # NOTA: Solo disponible en plan "starter" o superior ($7/mes)
    # En el plan free, los datos se pierden al reiniciar el servicio.
    # Para pruebas educativas el plan free es suficiente.
    disk:
      name: dc-simulator-data
      mountPath: /app/data
      sizeGB: 1        # 1 GB es suficiente para SQLite + reportes CSV/PDF

    # ── Auto-deploy desde Git ───────────────────────────────────────────
    autoDeploy: true    # re-deploy automático en cada push a main

databases:
  - name: dc-simulator-db
    plan: free          # PostgreSQL gratuito en Render (90 días, luego $7/mes)
    region: oregon
